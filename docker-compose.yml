services:
  backend:
    build: ./backend
    container_name: network-scanner-backend
    user: root
    ports:
      - "5000:5000"
    network_mode: host
    environment:
      - SECRET_KEY=change-this-in-production
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: network-scanner-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped